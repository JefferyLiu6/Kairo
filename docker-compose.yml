name: kairo

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.agent-python
    ports:
      - "${AGENT_PORT:-8766}:8766"
    environment:
      # ── Server ────────────────────────────────────────────────────────────────
      AGENT_PORT: "8766"
      PUBLIC_URL: "${PUBLIC_URL:?Set PUBLIC_URL, e.g. https://api.example.com}"
      DATA_DIR: /data
      VAULT_DIR: /vault

      # ── Security ──────────────────────────────────────────────────────────────
      SESSION_SECRET: "${SESSION_SECRET:?Set SESSION_SECRET to a random 32-byte secret}"
      COOKIE_SECURE: "${COOKIE_SECURE:-true}"
      COOKIE_SAMESITE: "${COOKIE_SAMESITE:-none}"
      CORS_ORIGINS: "${CORS_ORIGINS:?Set CORS_ORIGINS to your frontend origin}"
      ENABLE_DEMO_WEB_ROUTES: "${ENABLE_DEMO_WEB_ROUTES:-0}"
      # Optional legacy token, used only when ENABLE_DEMO_WEB_ROUTES=1.
      GATEWAY_TOKEN: "${GATEWAY_TOKEN:-}"

      # ── Abuse controls ────────────────────────────────────────────────────────
      RATE_LIMIT_RPM: "${RATE_LIMIT_RPM:-60}"

      # ── LLM ───────────────────────────────────────────────────────────────────
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      MODEL: "${MODEL:-}"
      PM_MODEL: "${PM_MODEL:-}"

      # ── Google Calendar ───────────────────────────────────────────────────────
      GOOGLE_CALENDAR_CLIENT_ID: "${GOOGLE_CALENDAR_CLIENT_ID}"
      GOOGLE_CALENDAR_CLIENT_SECRET: "${GOOGLE_CALENDAR_CLIENT_SECRET}"
      # GOOGLE_CALENDAR_REDIRECT_URI auto-derived from PUBLIC_URL if not set
      GOOGLE_CALENDAR_REDIRECT_URI: "${GOOGLE_CALENDAR_REDIRECT_URI:-}"

    volumes:
      - pm_data:/data
      - pm_vault:/vault

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8766/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE: "${VITE_API_BASE:?Set VITE_API_BASE to the backend origin}"
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pm_data:
  pm_vault:
